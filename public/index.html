<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Inventaris Gudang</title>
    <style>
        /* Desain Modern dengan Gradient Background */
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #8B0000 0%, #D2691E 100%); 
            color: white;
            min-height: 100vh;
        }

        /* Navigasi */
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: rgba(0,0,0,0.2); }
        .logo { max-width: 150px; margin-right: 30px; }
        .nav-links { display: flex; gap: 20px; list-style: none; }

        /* Teks Utama */
        .hero { padding: 100px 50px; }
        .hero h1 { font-size: 3rem; margin: 0; }
        
        /* Area Konten (Form & Tabel) */
        .content-box { 
            background: white; 
            color: black; 
            padding: 30px; 
            margin: 20px 50px; 
            border-radius: 10px; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <!-- Navigasi -->
    <div class="navbar">
        <img src="images.jpg" alt="Logo" class="logo">
        <ul class="nav-links">
            <li>Profile</li>
            <li>Faculty</li>
            <li>Institution</li>
        </ul>
    </div>

    <!-- Teks Hero -->
    <div class="hero">
        <h1>EXPERIENCE<br>THE REAL THINGS</h1>
    </div>

    <!-- Area Input & Tabel -->
    <div class="content-box">
        <h2>Input Barang Baru</h2>
        <input type="text" id="brand" placeholder="Brand">
        <input type="text" id="barang" placeholder="Barang">
        <button onclick="simpanData()">Simpan</button>

        <table id="tabelBarang">
            <tr><th>Brand</th><th>Barang</th></tr>
        </table>
    </div>

    <script>
        function simpanData() {
            var table = document.getElementById('tabelBarang');
            var row = table.insertRow(-1);
            row.insertCell(0).innerHTML = document.getElementById('brand').value;
            row.insertCell(1).innerHTML = document.getElementById('barang').value;
        }
    </script>
</body>
</html>
