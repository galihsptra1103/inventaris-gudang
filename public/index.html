<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Inventaris Gudang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-perusahaan { max-width: 300px; height: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        input { padding: 8px; margin-bottom: 10px; width: 120px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="images.jpg" alt="Logo Perusahaan" class="logo-perusahaan">
    </div>

    <h2>Input Barang Baru</h2>
    <input type="text" id="brand" placeholder="BRAND">
    <input type="text" id="part" placeholder="Part Number">
    <input type="text" id="barang" placeholder="Barang">
    <input type="text" id="stok" placeholder="Stok Awal 2024">
    <input type="text" id="uom" placeholder="Uom">
    <input type="text" id="note" placeholder="NOTE">
    <button onclick="simpanData()">Simpan</button>
    <button onclick="exportExcel()" style="background-color: green; color: white;">Export Excel</button>

    <table id="tabelBarang">
        <thead>
            <tr>
                <th>BRAND</th><th>Part Number</th><th>Barang</th><th>Stok Awal 2024</th><th>Uom</th><th>NOTE</th><th>Stok Akhir</th><th></th>
            </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
    </table>

    <script>
        window.onload = function() {
            var savedData = localStorage.getItem("dataInventaris");
            if (savedData) { document.getElementById("tabelBody").innerHTML = savedData; }
        };

        function simpanData() {
            var tbody = document.getElementById('tabelBody');
            var stokAwal = document.getElementById('stok').value;
            var row = tbody.insertRow(-1);
            
            row.insertCell(0).innerHTML = document.getElementById('brand').value;
            row.insertCell(1).innerHTML = document.getElementById('part').value;
            row.insertCell(2).innerHTML = document.getElementById('barang').value;
            row.insertCell(3).innerHTML = stokAwal;
            row.insertCell(4).innerHTML = document.getElementById('uom').value;
            row.insertCell(5).innerHTML = document.getElementById('note').value;
            row.insertCell(6).innerHTML = stokAwal;
            // Tombol fungsi ada di sini tanpa judul kolom "Aksi"
            row.insertCell(7).innerHTML = '<button onclick="ambilBarang(this)">Ambil</button> <button onclick="hapusBaris(this)" style="background-color: red; color: white;">Hapus</button>';

            simpanKeBrowser();
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function ambilBarang(btn) {
            var row = btn.parentNode.parentNode;
            var stokAkhirCell = row.cells[6];
            var stok = parseInt(stokAkhirCell.innerHTML);
            if (!isNaN(stok) && stok > 0) {
                stokAkhirCell.innerHTML = stok - 1;
                simpanKeBrowser();
            } else { alert("Stok habis!"); }
        }

        function hapusBaris(btn) {
            var row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
            simpanKeBrowser();
        }

        function simpanKeBrowser() {
            localStorage.setItem("dataInventaris", document.getElementById("tabelBody").innerHTML);
        }

        function exportExcel() {
            var table = document.getElementById("tabelBarang");
            var wb = XLSX.utils.table_to_book(table, {sheet:"Inventaris"});
            XLSX.writeFile(wb, "Data_Inventaris.xlsx");
        }
    </script>
</body>
</html>
