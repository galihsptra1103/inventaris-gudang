<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Inventaris Gudang</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 40px; 
            background-color: #f4f7f6; /* Warna latar belakang abu-abu muda */
        }

        .container {
            background-color: white; /* Konten utama di dalam kotak putih */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1); /* Efek bayangan agar terlihat elegan */
            max-width: 1000px;
            margin: auto;
        }

        .logo-container { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 30px; 
        }
        .logo-perusahaan { 
            max-width: 300px; /* Logo besar */
            height: auto; 
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        input { padding: 8px; margin-bottom: 10px; width: 150px; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="logo-container">
            <img src="images.jpg" alt="Logo Perusahaan" class="logo-perusahaan">
        </div>

        <h2>Input Barang Baru</h2>
        
        <input type="text" id="brand" placeholder="Brand">
        <input type="text" id="part" placeholder="Part Number">
        <input type="text" id="barang" placeholder="Barang">
        <input type="text" id="stok" placeholder="Stok Awal">
        <input type="text" id="uom" placeholder="Uom">
        <input type="text" id="note" placeholder="Note">
        <button onclick="simpanData()">Simpan</button>

        <table id="tabelBarang">
            <tr>
                <th>Brand</th>
                <th>Part Number</th>
                <th>Barang</th>
                <th>Stok Awal</th>
                <th>Uom</th>
                <th>Note</th>
                <th>Stok Akhir</th>
            </tr>
        </table>

    </div>

    <script>
        function simpanData() {
            var brand = document.getElementById('brand').value;
            var part = document.getElementById('part').value;
            var barang = document.getElementById('barang').value;
            var stok = document.getElementById('stok').value;
            var uom = document.getElementById('uom').value;
            var note = document.getElementById('note').value;
            
            if(brand == "" || barang == "") { alert("Mohon isi data!"); return; }

            var table = document.getElementById('tabelBarang');
            var row = table.insertRow(-1);
            
            row.insertCell(0).innerHTML = brand;
            row.insertCell(1).innerHTML = part;
            row.insertCell(2).innerHTML = barang;
            row.insertCell(3).innerHTML = stok;
            row.insertCell(4).innerHTML = uom;
            row.insertCell(5).innerHTML = note;
            row.insertCell(6).innerHTML = stok; 

            document.querySelectorAll('input').forEach(input => input.value = "");
        }
    </script>
</body>
</html>
